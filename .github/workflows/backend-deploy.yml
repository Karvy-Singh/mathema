name: Backend — Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/bicep/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

env:
  RESOURCE_GROUP: mathema-rg
  ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}             # 예: mathemaacrxxxx
  CONTAINER_APP_NAME: mathema-backend
  IMAGE_NAME: mathema-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC federated identity for `az login`
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Compute image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: ACR login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push image
        working-directory: backend
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy new revision to Container App
        run: |
          az containerapp update \
            --name  ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Verify revision is healthy
        run: |
          FQDN=$(az containerapp show -n ${{ env.CONTAINER_APP_NAME }} -g ${{ env.RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn -o tsv)
          for i in {1..20}; do
            STATUS=$(curl -fsS -o /dev/null -w "%{http_code}" "https://$FQDN/api/v1/health/ready" || echo "fail")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "200" ]; then exit 0; fi
            sleep 6
          done
          echo "❌ readiness check failed"
          exit 1
